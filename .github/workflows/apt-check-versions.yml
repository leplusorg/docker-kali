---
name: APT Check Versions

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  apt-check-versions:
    permissions:
      # Required to clone repo
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Set IMAGE
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'	
          echo "IMAGE=${GITHUB_REPOSITORY#*/docker-}" >> "${GITHUB_ENV}"
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Check the versions
        shell: bash
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          PINNED=$(sed -n '/apt-get install/,/apt-get --purge/p' "${IMAGE}/Dockerfile" \
            | grep -oE '^[[:space:]]+[a-zA-Z0-9][a-zA-Z0-9.+-]*=' \
            | sed 's/^[[:space:]]*//; s/=$//' \
            | sort -u)
          echo "Pinned packages:"
          echo "${PINNED}"
          docker run --pull always -t --user root \
            -e PINNED="${PINNED}" \
            --entrypoint /bin/bash \
            "leplusorg/${IMAGE}:main" \
            -c '
              set -euo pipefail
              apt-get update >/dev/null
              upgradable=$(apt list --upgradable 2>/dev/null | tail -n +2 | cut -d/ -f1 | sort -u)
              outdated=$(comm -12 <(echo "${PINNED}") <(echo "${upgradable}"))
              if [ -n "${outdated}" ]; then
                echo "Outdated pinned packages:"
                echo "${outdated}"
                exit 1
              fi
              echo "All pinned packages are up to date."
            '
